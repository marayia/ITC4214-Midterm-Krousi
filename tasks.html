<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KMC Studios - Tasks</title>
    <link rel="icon" type="image/x-icon" href="./img/favicon.svg">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="./css/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="./js/navbar.js" defer></script>
    <script src="./js/footer.js" defer></script>
    <script src="./js/tasks.js" defer></script>
</head>
<body>
    <main class="container-fluid text-center">

        <header class="p-4">
            <h1>Task Board</h1>
            <hr class="border border-2 opacity-50">
        </header>

        <!-- add task form -->
        <div class="container mb-4">
            <h2>Add New Task</h2>
            <div class="row g-3 justify-content-center mt-2">
                <div class="col-md-3">
                    <input type="text" id="taskName" class="form-control" placeholder="Task name">
                </div>
                <div class="col-md-3">
                    <input type="text" id="taskDesc" class="form-control" placeholder="Description">
                </div>
                <div class="col-md-2">
                    <input type="date" id="taskDate" class="form-control">
                </div>
                <div class="col-md-2">
                    <select id="taskPriority" class="form-select">
                        <option value="" disabled selected>Priority</option>
                        <option value="High">High</option>
                        <option value="Medium">Medium</option>
                        <option value="Low">Low</option>
                    </select>
                </div>
                <div class="col-auto">
                    <button id="addTaskBtn" class="btn btn-primary">Add Task</button>
                </div>
            </div>
        </div>

        <!-- summary -->

        <div class="container mb-4">
            <div class="row justify-content-center g-3">
                <div class="col-auto">
                    <div class="summary-card">
                        <div class="summary-number" id="totalTasks">0</div>
                        <div class="summary-label">Total</div>
                    </div>
                </div>
                <div class="col-auto">
                    <div class="summary-card summary-pending">
                        <div class="summary-number" id="pendingTasks">0</div>
                        <div class="summary-label">Pending</div>
                    </div>
                </div>
                <div class="col-auto">
                    <div class="summary-card summary-completed">
                        <div class="summary-number" id="completedTasks">0</div>
                        <div class="summary-label">Completed</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- sorting -->
        <div class="container mb-3">
            <div class="row g-2 justify-content-center">
                <div class="col-auto">
                    <select id="filterStatus" class="form-select" onchange="applyFilters()">
                        <option value="all">All Statuses</option>
                        <option value="pending">Pending</option>
                        <option value="completed">Completed</option>
                    </select>
                </div>
                <div class="col-auto">
                    <select id="filterPriority" class="form-select" onchange="applyFilters()">
                        <option value="all">All Priorities</option>
                        <option value="High">High</option>
                        <option value="Medium">Medium</option>
                        <option value="Low">Low</option>
                    </select>
                </div>
                <div class="col-auto">
                    <select id="sortBy" class="form-select" onchange="applyFilters()">
                        <option value="none">No Sorting</option>
                        <option value="name">Sort by Name</option>
                        <option value="date">Sort by Date</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- tasks table -->
        <div class="container mb-5">
            <div class="table-responsive">
                <table class="table table-dark table-hover table-bordered text-center align-middle">
                    <thead>
                        <tr>
                            <th>Task</th>
                            <th>Description</th>
                            <th>Due Date</th>
                            <th>Priority</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="taskTableBody">
                        <tr>
                            <td colspan="6" class="text-muted">No tasks yet. Add one above!</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- analytics, done here to be able to access the chart elements from form -->
        <div class="container mb-5">
            <h2>Analytics</h2>
            <hr class="border border-2 opacity-50">
            <div class="row justify-content-center g-4 mt-1">
                <div class="col-md-5">
                    <h3>Completed vs Pending</h3>
                    <canvas id="barChart"></canvas>
                </div>
                <div class="col-md-4">
                    <h3>Tasks by Priority</h3>
                    <canvas id="pieChart"></canvas>
                </div>
            </div>
        </div>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
