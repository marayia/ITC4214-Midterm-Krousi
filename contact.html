<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KMC Studios - Contact</title>
    <link rel="icon" type="image/x-icon" href="./img/favicon.svg">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="./css/styles.css">
    <script src="./js/navbar.js" defer></script>
    <script src="./js/footer.js" defer></script>
    <script src="./js/contact.js" defer></script>
</head>
<body>
    <main class="container-fluid text-center">

        <header class="p-4">
            <h1>Contact Us</h1>
            <hr class="border border-2 opacity-50">
            <p class="fs-5 mx-auto" style="max-width: 600px;">
                Have a question, suggestion, or just want to say hi? 
                We'd love to hear from you!
            </p>
        </header>

        <!-- form and map -->
        <div class="container py-4">
            <div class="row g-4 align-items-stretch">

                <!-- contact form -->
                <div class="col-lg-6 text-start">
                    <div class="pixel-box h-100">
                        <h2 class="mb-4 text-center">Send a Message</h2>

                        <div class="mb-3">
                            <label for="contactName" class="form-label">Name</label>
                            <input type="text" id="contactName" class="form-control" placeholder="Your name">
                        </div>

                        <div class="mb-3">
                            <label for="contactEmail" class="form-label">Email</label>
                            <input type="email" id="contactEmail" class="form-control" placeholder="your@email.com">
                        </div>

                        <div class="mb-3">
                            <label for="contactSubject" class="form-label">Subject</label>
                            <input type="text" id="contactSubject" class="form-control" placeholder="What is this about?" maxlength="20">
                        </div>

                        <div class="mb-4">
                            <label for="contactMessage" class="form-label">Message</label>
                            <textarea id="contactMessage" class="form-control" rows="5" placeholder="Your message..."></textarea>
                        </div>

                        <div class="text-center">
                            <button id="contactSubmitBtn" class="btn btn-primary">Send Message</button>
                        </div>
                    </div>
                </div>

                <!-- map -->
                <div class="col-lg-6">
                    <div class="pixel-box h-100 p-0 overflow-hidden">
                        <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3280.6990736263438!2d135.50878501220745!3d34.687543672811465!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x6000e72734200221%3A0x51d17a0547560ef!2sCapcom%20Osaka%20Head%20Office!5e0!3m2!1sen!2sgr!4v1772792987815!5m2!1sen!2sgr" width="100%" height="100%" style="min-height: 400px; border: 0; display: block;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
                    </div>
                </div>

            </div>
        </div>

        <!-- social media links (also exist in footer, but for display purposes only)-->
        <div class="container py-4 pb-5">
            <h2 class="mb-4">Find Us Online</h2>
            <div class="d-flex justify-content-center gap-3 flex-wrap">
                <a href="https://www.facebook.com/AmericanCollegeofGreece/" aria-label="Facebook Link" class="social-link" target="_blank">
                    <i class="bi bi-facebook"></i> Facebook
                </a>
                <a href="https://store.steampowered.com" aria-label="Steam Link" class="social-link" target="_blank">
                    <i class="bi bi-steam"></i> Steam
                </a>
                <a href="https://www.instagram.com/deree_acg/?hl=en" aria-label="Instagram Link" class="social-link" target="_blank">
                    <i class="bi bi-instagram"></i> Instagram
                </a>
                <a href="https://github.com/marayia" aria-label="GitHub Link" class="social-link" target="_blank">
                    <i class="bi bi-github"></i> GitHub
                </a>
            </div>
        </div>

    </main>

    <!-- confirmation -->
    <div class="modal fade" id="confirmationModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content" style="background-color: #1d1c1b; border: 2px solid #594D4E; border-radius: 0;">
                <div class="modal-header" style="border-bottom: 1px solid #3a2e2a;">
                    <h5 class="modal-title" style="font-family: 'Pixelify Sans', sans-serif; color: #cab3b3;">Message Sent!</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" style="color: #cab3b3; font-family: 'Pixelify Sans', sans-serif;">
                    <p>Thanks for reaching out, <strong id="modalName"></strong>!</p>
                    <p>We received your message about <strong id="modalSubject"></strong> and will get back to you at <strong id="modalEmail"></strong> soon.</p>
                </div>
                <div class="modal-footer" style="border-top: 1px solid #3a2e2a;">
                    <button type="button" class="btn btn-primary" data-bs-dismiss="modal">Close</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
